<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pixel Paint Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-1: #f4f7ff;
      --bg-2: #eef3ff;
      --text-main: #1f2a44;
      --text-muted: #6b7280;
      --line: rgba(49, 94, 251, 0.10);
      --primary-shadow: 0 18px 40px rgba(49, 94, 251, 0.18);
      --card-shadow: 0 16px 40px rgba(31, 42, 68, 0.08);
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Arial, "Noto Sans TC", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(49, 94, 251, 0.10), transparent 28%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    .entry-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .entry-panel {
      width: min(100%, 720px);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 32px;
      box-shadow: var(--card-shadow);
      padding: 28px;
    }

    .entry-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 14px;
      background: rgba(49, 94, 251, 0.10);
      color: #315efb;
      font-weight: 700;
      font-size: 0.92rem;
      margin-bottom: 18px;
    }

    .entry-title {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .entry-desc {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 560px;
      margin: 0 auto 28px;
    }

    .entry-main-link {
      display: block;
      text-decoration: none;
      border-radius: 28px;
      padding: 28px 24px;
      color: #fff;
      background: linear-gradient(135deg, #315efb 0%, #5b7cff 100%);
      box-shadow: var(--primary-shadow);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .entry-main-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 48px rgba(49, 94, 251, 0.24);
      color: #fff;
    }

    .entry-main-label {
      font-size: 0.92rem;
      opacity: 0.9;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .entry-main-title {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .entry-main-desc {
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.92;
      margin: 0;
    }

    .entry-sub-wrap {
      margin-top: 18px;
      display: flex;
      justify-content: center;
    }

    .entry-sub-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      background: #fff;
      color: var(--text-main);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px 18px;
      min-width: min(100%, 420px);
      box-shadow: 0 10px 24px rgba(31, 42, 68, 0.06);
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .entry-sub-link:hover {
      transform: translateY(-2px);
      border-color: rgba(49, 94, 251, 0.28);
      box-shadow: 0 14px 28px rgba(31, 42, 68, 0.08);
      color: var(--text-main);
    }

    .entry-sub-icon,
    .entry-main-icon {
      flex: 0 0 auto;
      width: 52px;
      height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      font-size: 1.4rem;
      font-weight: 800;
    }

    .entry-main-icon {
      background: rgba(255,255,255,0.18);
      color: #fff;
    }

    .entry-sub-icon {
      background: rgba(49, 94, 251, 0.08);
      color: #315efb;
    }

    .entry-sub-title {
      font-weight: 800;
      font-size: 1.06rem;
      margin-bottom: 4px;
    }

    .entry-sub-desc {
      color: var(--text-muted);
      margin: 0;
      line-height: 1.55;
      font-size: 0.95rem;
    }

    @media (max-width: 576px) {
      .entry-panel {
        padding: 22px 18px;
        border-radius: 24px;
      }

      .entry-main-link {
        padding: 22px 18px;
        border-radius: 22px;
      }

      .entry-sub-link {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="entry-shell">
    <section class="entry-panel text-center">
      <div class="entry-badge">Pixel Paint Studio</div>
      <h1 class="entry-title">選擇模式開始使用</h1>
      <p class="entry-desc">
        上方入口提供使用者直接開始塗畫，下方入口保留離線製圖與 JSON 產生流程。
      </p>

      <a class="entry-main-link" href="./paint.html">
        <div class="d-flex align-items-center gap-3 text-start">
          <div class="entry-main-icon">🎨</div>
          <div>
            <div class="entry-main-label">主要入口</div>
            <div class="entry-main-title">開始畫畫</div>
            <p class="entry-main-desc">進入塗鴉頁，選擇現有圖片並開始依編號填色。</p>
          </div>
        </div>
      </a>

      <div class="entry-sub-wrap">
        <a class="entry-sub-link text-start" href="./offline.html">
          <div class="entry-sub-icon">⚙️</div>
          <div>
            <div class="entry-sub-title">離線製圖</div>
            <p class="entry-sub-desc">匯入圖片、像素化、產生 JSON 與線稿底圖，再放回 GitHub 使用。</p>
          </div>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
