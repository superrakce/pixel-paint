<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>塗鴉頁｜Pixel Paint Studio</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body data-page="draw">
  <div class="app-shell">
    <div class="page-header">
      <div>
        <h1 class="page-title">塗鴉頁</h1>
        <div class="page-subtitle">從圖片清單挑選的圖會在這裡打開。選色後點擊對應編號區塊即可填色。</div>
      </div>
      <div class="inline-actions">
        <a class="btn" href="./paint.html">返回圖片清單</a>
        <a class="btn" href="./index.html">返回首頁</a>
      </div>
    </div>

    <section id="playView" class="panel hidden">
      <div class="play-topbar" style="justify-content: space-between; margin-bottom: 14px;">
        <div>
          <div class="section-title" id="playTitle">開始繪圖</div>
          <div class="section-desc" id="playSubtitle">請先從圖片選單選一張圖。</div>
        </div>
        <div class="toolbar">
          <button class="btn danger" id="clearPaintBtn">清除重繪</button>
          <a class="btn" href="./paint.html">返回圖片選單</a>
          <button class="btn primary" id="exportPaintBtn">匯出繪圖結果</button>
        </div>
      </div>

      <div class="play-area">
        <div>
          <div class="play-stage" id="playStage">
            <div class="stage-inner">
              <canvas id="playCanvas"></canvas>
            </div>
          </div>

          <div class="palette-bar">
            <div class="palette-actions" style="margin-bottom:10px; justify-content: space-between;">
              <div class="pill">
                <input id="forceFillToggle" type="checkbox" />
                <label for="forceFillToggle">強制填色</label>
              </div>
              <div class="muted" id="selectedColorText">尚未選擇色塊</div>
            </div>
            <div class="palette-scroll" id="paletteBar"></div>
          </div>
        </div>

        <div class="zoom-controls">
          <button class="btn zoom-btn" id="zoomInBtn">＋</button>
          <button class="btn zoom-btn" id="zoomOutBtn">－</button>
        </div>
      </div>
    </section>

    <section id="drawEmpty" class="panel empty-state hidden">
      <div class="section-title">還沒有選擇圖片</div>
      <div class="section-desc">請先回到圖片清單頁選一張圖片，再進入這個塗鴉頁。</div>
      <div class="inline-actions">
        <a class="btn primary" href="./paint.html">前往圖片清單</a>
      </div>
    </section>
  </div>
  <script src="./assets/app.js"></script>
</body>
</html>
