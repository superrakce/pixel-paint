<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>塗鴉頁｜Pixel Paint Studio</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>

<body data-page="draw">
  <div class="app-shell">
    <section id="playView" class="panel hidden">
      <div class="play-topbar">
        <div class="play-topbar-main">
          <div>
            <div class="section-title" id="playTitle">開始繪圖</div>
            <div class="section-desc" id="playSubtitle">請先從下方選擇色塊，再點擊底圖上的對應編號。</div>
          </div>
          <button class="btn play-topbar-toggle" id="playTopbarToggle" type="button" aria-expanded="true">收合</button>
        </div>
        <div class="toolbar play-topbar-actions">
          <a class="btn" href="./paint.html">返回圖片清單</a>
          <a class="btn" href="./index.html">返回首頁</a>
          <button class="btn danger" id="clearPaintBtn">清除重繪</button>
          <button class="btn primary" id="exportPaintBtn">匯出繪圖結果</button>
        </div>
      </div>

      <div class="play-area">
        <div class="play-stage" id="playStage">
          <div class="stage-inner">
            <canvas id="playCanvas"></canvas>
          </div>
        </div>

        <div class="palette-bar">
          <div class="palette-scroll" id="paletteBar"></div>
        </div>

        <div class="zoom-controls">
          <button class="btn zoom-btn" id="zoomInBtn">＋</button>
          <button class="btn zoom-btn" id="zoomOutBtn">－</button>
          <div class="zoom-thumbs">
            <div class="palette-thumb-frame">
              <canvas id="pixelThumbCanvas" class="palette-thumb-canvas" title="像素圖縮圖"></canvas>
            </div>
            <div class="palette-thumb-frame">
              <canvas id="progressThumbCanvas" class="palette-thumb-canvas" title="目前完成縮圖"></canvas>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="drawEmpty" class="panel empty-state hidden">
      <div class="section-title">還沒有選擇圖片</div>
      <div class="section-desc">請先回到圖片清單頁選一張圖片，再進入這個塗鴉頁。</div>
      <div class="inline-actions">
        <a class="btn primary" href="./paint.html">前往圖片清單</a>
      </div>
    </section>
  </div>
  <script src="./assets/app.js"></script>
</body>

</html>
